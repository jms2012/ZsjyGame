name: Build & Deploy Game to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动触发编译

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取你的项目代码
        uses: actions/checkout@v4

      - name: 配置Emscripten编译环境
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      # 新增：拉取Raylib 5.0稳定版源码
      - name: 拉取Raylib源码
        run: git clone --depth 1 --branch 5.0.0 https://github.com/raysan5/raylib.git raylib

      # 编译：直接把Raylib和你的游戏代码一起编译，比旧写法更稳定
      - name: 编译为网页WASM
        run: |
          mkdir -p docs
          # ⚠️ 把下面的main.cpp改成你自己的代码文件名，资源也改成你项目里实际存在的，没有的资源删掉对应行即可
          emcc main.cpp raylib/src/*.c -o docs/index.html \
            -DPLATFORM_WEB \
            -I./raylib/src \
            -s USE_GLFW=3 \
            -s ASYNCIFY \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s EXPORTED_FUNCTIONS=['_main'] \
            --preload-file wxyy.mp3

      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
