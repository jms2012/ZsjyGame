name: Build and Deploy Raylib Game
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 自动拉取Raylib源码（如果你已经把Raylib放到项目里可以注释掉这行）
      - name: Clone Raylib if missing
        if: ${{ !exists('raylib') }}
        run: git clone --depth 1 https://github.com/raysan5/raylib.git raylib

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Compile to WebAssembly
        run: |
          mkdir -p docs
          # 1. 编译Raylib核心（不编译自带的GLFW，用Emscripten自带的Web版GLFW，解决符号问题）
          emcc -c raylib/src/rcore.c raylib/src/rshapes.c raylib/src/rtextures.c \
            raylib/src/rtext.c raylib/src/rmodels.c raylib/src/raudio.c \
            -DPLATFORM_WEB -DGRAPHICS_API_OPENGL_ES2 -I./raylib/src -Os

          # 2. 编译你的游戏，输出网页文件到docs文件夹
          # 如果有音频/图片资源，在末尾加 --preload-file 你的资源文件名 即可
          emcc main.cpp *.o -o docs/index.html \
            -I./raylib/src \
            -DPLATFORM_WEB \
            -s USE_GLFW=3 \
            -s TOTAL_MEMORY=64MB \
            -s EXPORTED_FUNCTIONS=['_main'] \
            -s EXPORTED_RUNTIME_METHODS=['ccall'] \
            --shell-file raylib/src/shell.html \
            -Os

      # 自动部署到GitHub Pages
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
