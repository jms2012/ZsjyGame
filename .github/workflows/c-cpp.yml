name: Build and Deploy Raylib Game
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 如果你已经把raylib源码放到自己项目里了，把下面这一整行注释掉就行
      - name: Clone Raylib source code
        run: git clone --depth 1 https://github.com/raysan5/raylib.git raylib

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Compile to WebAssembly
        run: |
          mkdir -p docs
          # 编译适配Web的Raylib，解决之前的GLFW符号未定义错误
          emcc -c raylib/src/rcore.c raylib/src/rshapes.c raylib/src/rtextures.c \
            raylib/src/rtext.c raylib/src/rmodels.c raylib/src/raudio.c \
            -DPLATFORM_WEB -DGRAPHICS_API_OPENGL_ES2 -I./raylib/src -Os

          # 编译你的游戏主程序
          # 如果有音频/图片资源，在末尾`-Os`之前加上：--preload-file 你的资源文件名
          emcc main.cpp *.o -o docs/index.html \
            -I./raylib/src \
            -DPLATFORM_WEB \
            -s USE_GLFW=3 \
            -s TOTAL_MEMORY=512MB \  # 256MB (从128MB增大；如果还不够，试536870912=512MB)
            -s ALLOW_MEMORY_GROWTH=1 \   # 允许动态增长，防止硬溢出
            -s INITIAL_MEMORY=16777216 \ # 初始16MB，渐增
            -s ASSERTIONS=2 \            # 启用详细断言，Console会显示具体越界位置
            -s SAFE_HEAP=1 \             # 堆检查，捕获无效指针
            -s ABORTING_MALLOC=0 \       # 失败时不立即崩溃，继续运行以调试
            -s EXPORTED_FUNCTIONS=['_main'] \
            -s EXPORTED_RUNTIME_METHODS=['ccall'] \
            --shell-file raylib/src/shell.html \
            --preload-file wxyy.mp3 \
            -Os

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
